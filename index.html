<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task Board v11</title>
<style>
body{margin:0;font-family:system-ui;background:#f4f6f8;padding-bottom:70px}
header{position:sticky;top:0;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:20}
.header-row{display:flex;justify-content:space-between;align-items:center}
.app-title{margin:0;font-size:24px;font-weight:800}
.search{width:100%;padding:12px;margin-top:10px;border:1px solid #ddd;border-radius:12px;box-sizing:border-box}
.bell{border:none;background:none;font-size:24px;position:relative}
.badge{position:absolute;top:-4px;right:-4px;background:red;color:#fff;border-radius:50%;padding:2px 6px;font-size:10px}
.tabs{display:flex;background:#fff;position:sticky;top:105px}
.tab{flex:1;padding:14px;border:none;background:#fff;font-weight:700}.active{border-bottom:3px solid #2563eb;color:#2563eb}
#list{padding:12px}
.card{padding:14px;border-radius:16px;margin-bottom:12px;box-shadow:0 3px 12px rgba(0,0,0,.10)}
.todo{background:#f1f3f5}.progress{background:#e8f1ff}.done{background:#e8f8ec}
.title-row{display:flex;justify-content:space-between}.task-title{font-weight:800;cursor:pointer}
.priority{font-weight:700;padding:4px 10px;border-radius:10px;display:inline-block;margin:6px 0}
.high{background:#ffe5e5;color:#c62828}.medium{background:#fff0db;color:#ef6c00}.low{background:#fff9d6;color:#b8860b}
.bar{height:8px;background:#ddd;border-radius:10px;overflow:hidden}.fill{height:100%;background:#22c55e}
.actions button{background:#f3f4f6;border:1px solid #ddd;padding:8px 10px;border-radius:10px;margin:4px}
.delete-btn{background:#fee2e2}
.blue-btn{background:#2563eb;color:#fff;border:none;padding:10px 14px;border-radius:10px}
.fab{position:fixed;right:20px;bottom:80px;width:64px;height:64px;border-radius:50%;font-size:32px}
.footer{position:fixed;bottom:0;left:0;right:0;background:#111827;color:#fff;padding:14px;text-align:center;font-weight:700}
.modal{display:none;position:fixed;inset:0;background:#0007;align-items:center;justify-content:center}
.box{background:#fff;padding:16px;width:90%;max-width:420px;border-radius:16px;max-height:80vh;overflow:auto}
input,textarea,select{width:100%;padding:12px;margin:6px 0;box-sizing:border-box}
.note{padding:10px;border-bottom:1px solid #eee}
</style></head><body>
<header><div class="header-row"><h1 class="app-title">Task Board</h1><button class="bell" onclick="openNotifications()">🔔<span id="badge" class="badge">0</span></button></div><input id="search" class="search" placeholder="Search..." oninput="render()"></header>
<div class="tabs"><button class="tab active" onclick="setTab('todo',this)">To Do</button><button class="tab" onclick="setTab('progress',this)">Progress</button><button class="tab" onclick="setTab('done',this)">Done</button></div>
<div id="list"></div>
<button class="blue-btn fab" onclick="modal.style.display='flex'">+</button>

<div class="footer" id="footerStats">Completed: 0 / 0</div>

<div class="modal" id="modal"><div class="box"><h3>New Task</h3><input id="title" placeholder="Task Title"><textarea id="desc"></textarea><select id="priority"><option>Low</option><option>Medium</option><option>High</option></select><input id="dueDate" type="date"><button class="blue-btn" onclick="addTask()">Save</button></div></div>

<div class="modal" id="editModal"><div class="box"><h3>Task Details</h3><input id="editTitle" readonly><textarea id="editDesc" readonly></textarea><input id="editDueDate" readonly><input type="range" min="0" max="100" id="editCompletion"><div id="completionValue"></div><button class="blue-btn" onclick="saveCompletion()">Save</button></div></div>

<div class="modal" id="notificationModal"><div class="box"><h3>Notifications</h3><div id="notificationList"></div><button class="blue-btn" onclick="notificationModal.style.display='none'">Close</button></div></div>

<script>
let current='todo',selectedTask=null;
let tasks=JSON.parse(localStorage.getItem('mobileTasks')||'[]');
function save(){localStorage.setItem('mobileTasks',JSON.stringify(tasks));render();}
function setTab(t,e){current=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));e.classList.add('active');render();}
function addTask(){tasks.push({id:Date.now(),title:title.value,desc:desc.value,priority:priority.value,dueDate:dueDate.value,status:'todo',completion:0,subs:[]});save();modal.style.display='none';}
function openEdit(id){selectedTask=tasks.find(t=>t.id==id);editTitle.value=selectedTask.title;editDesc.value=selectedTask.desc;editDueDate.value=selectedTask.dueDate||'';editCompletion.value=selectedTask.completion||0;completionValue.innerText=editCompletion.value+'%';editModal.style.display='flex';}
editCompletion.oninput=()=>completionValue.innerText=editCompletion.value+'%';
function saveCompletion(){selectedTask.completion=+editCompletion.value;save();editModal.style.display='none';}
function move(id,d){const f=['todo','progress','done'];let t=tasks.find(x=>x.id==id);let i=f.indexOf(t.status);if(d==='r'&&i<2)t.status=f[i+1];if(d==='l'&&i>0)t.status=f[i-1];save();}
function delTask(id){if(confirm('Delete task?')){tasks=tasks.filter(t=>t.id!=id);save();}}
function addSub(id){let txt=prompt('Subtask');if(!txt)return;tasks.find(t=>t.id==id).subs.push({text:txt,done:false});save();}
function toggleSub(id,i){tasks.find(t=>t.id==id).subs[i].done=!tasks.find(t=>t.id==id).subs[i].done;save();}
function updateNotifications(){const td=new Date();td.setHours(0,0,0,0);const tm=new Date(td);tm.setDate(td.getDate()+1);let notes=[];tasks.forEach(t=>{if(!t.dueDate)return;let d=new Date(t.dueDate);d.setHours(0,0,0,0);if(d.getTime()==td.getTime())notes.push(t.title+' is due today');if(d.getTime()==tm.getTime())notes.push(t.title+' is due tomorrow');});badge.textContent=notes.length;window.notes=notes;}
function openNotifications(){notificationList.innerHTML=(window.notes||[]).map(n=>'<div class="note">🔔 '+n+'</div>').join('')||'<div class="note">No upcoming due tasks</div>';notificationModal.style.display='flex';}
function updateFooter(){const total=tasks.length;const completed=tasks.filter(t=>t.status==='done').length;footerStats.textContent=`Completed: ${completed} / ${total}`;}
function render(){list.innerHTML='';let q=(search.value||'').toLowerCase();tasks.filter(t=>t.status===current&&t.title.toLowerCase().includes(q)).forEach(t=>{let e=document.createElement('div');e.className='card '+t.status;e.innerHTML=`<div class="title-row"><div class="task-title" onclick="openEdit(${t.id})">${t.title}</div><div>📅 ${t.dueDate||'No Date'}</div></div><p>${t.desc||''}</p><div class="priority ${t.priority.toLowerCase()}">${t.priority}</div><div class="bar"><div class="fill" style="width:${t.completion||0}%"></div></div><small>${t.completion||0}% Complete</small>${t.subs.map((s,i)=>`<div><input type='checkbox' ${s.done?'checked':''} onchange='toggleSub(${t.id},${i})'> ${s.text}</div>`).join('')}<div class="actions">${t.status!='todo'?`<button onclick="move(${t.id},'l')">⬅️</button>`:''}${t.status!='done'?`<button onclick="move(${t.id},'r')">➡️</button>`:''}<button onclick="addSub(${t.id})">➕ Subtask</button><button class="delete-btn" onclick="delTask(${t.id})">🗑️ Delete</button></div>`;list.appendChild(e);});updateNotifications();updateFooter();}
render();
</script></body></html>
