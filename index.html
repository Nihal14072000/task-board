<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Board</title><style>
:root{
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#222;
    --border:#e2e8f0;
    --shadow:0 4px 12px rgba(0,0,0,.08);
    --primary:#2563eb;
    --success:#22c55e;
}

.dark{
    --bg:#111827;
    --card:#1f2937;
    --text:#f3f4f6;
    --border:#374151;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:16px;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
}

button{
    border:none;
    cursor:pointer;
}

.top-actions{
    display:flex;
    gap:10px;
}

.btn{
    padding:10px 14px;
    border-radius:10px;
    background:var(--primary);
    color:white;
}

.board{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:15px;
}

.column{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    min-height:500px;
    padding:12px;
}

.column h3{
    margin-bottom:10px;
}

.task{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
    box-shadow:var(--shadow);
}

.task input[type=text],
.task textarea,
.modal input,
.modal textarea,
.modal select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:8px;
}

.priority{
    font-size:12px;
    padding:4px 8px;
    border-radius:20px;
    display:inline-block;
    color:white;
}

.low{background:#22c55e;}
.medium{background:#f59e0b;}
.high{background:#ef4444;}

.progress{
    background:#e5e7eb;
    height:8px;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.progress-fill{
    background:var(--success);
    height:100%;
}

.subtask{
    display:flex;
    gap:6px;
    margin-top:6px;
}

.delete{
    float:right;
    color:red;
    font-weight:bold;
    cursor:pointer;
}

.fab{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:var(--primary);
    color:white;
    font-size:30px;
    box-shadow:var(--shadow);
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:var(--card);
    padding:20px;
    width:95%;
    max-width:450px;
    border-radius:12px;
}

.toast{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:#fff;
    padding:10px 16px;
    border-radius:8px;
    display:none;
}
</style></head>
<body><header>
    <h2>Task Board</h2>
    <div class="top-actions">
        <button class="btn" onclick="toggleTheme()">🌙</button>
        <button class="btn" onclick="exportTasks()">Export</button>
        <input type="file" id="importFile" hidden>
        <button class="btn" onclick="document.getElementById('importFile').click()">Import</button>
    </div>
</header><div class="board">
    <div class="column" data-status="todo">
        <h3>To Do (<span id="todoCount">0</span>)</h3>
        <div class="task-list"></div>
    </div><div class="column" data-status="progress">
    <h3>In Progress (<span id="progressCount">0</span>)</h3>
    <div class="task-list"></div>
</div>

<div class="column" data-status="done">
    <h3>Done (<span id="doneCount">0</span>)</h3>
    <div class="task-list"></div>
</div>

</div><button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Add Task</h3>    <input id="title" placeholder="Task title">

    <textarea id="description" placeholder="Description"></textarea>

    <select id="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <input type="date" id="dueDate">

    <button class="btn" onclick="createTask()">Save Task</button>
</div>

</div><div class="toast" id="toast"></div><script>
class TaskBoard {

    constructor(){
        this.tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        this.render();
    }

    save(){
        localStorage.setItem("tasks", JSON.stringify(this.tasks));
        this.render();
    }

    add(task){
        this.tasks.push(task);
        this.save();
    }

    delete(id){
        if(confirm("Delete task?")){
            this.tasks=this.tasks.filter(t=>t.id!==id);
            this.save();
            showToast("Task deleted");
        }
    }

    toggleSubtask(taskId,index){
        let task=this.tasks.find(t=>t.id===taskId);
        task.subtasks[index].completed=!task.subtasks[index].completed;
        this.save();
    }

    render(){

        document.querySelectorAll(".task-list")
        .forEach(x=>x.innerHTML="");

        let counts={
            todo:0,
            progress:0,
            done:0
        };

        this.tasks.forEach(task=>{

            counts[task.status]++;

            let completed=
                task.subtasks.filter(s=>s.completed).length;

            let percent=
                task.subtasks.length
                ? Math.round((completed/task.subtasks.length)*100)
                : 0;

            let card=document.createElement("div");
            card.className="task";

            card.innerHTML=`
                <span class="delete"
                 onclick="board.delete('${task.id}')">✕</span>

                <h4>${task.title}</h4>

                <p>${task.description||""}</p>

                <span class="priority ${task.priority.toLowerCase()}">
                    ${task.priority}
                </span>

                <p>Due: ${task.dueDate||"-"}</p>

                <div class="progress">
                    <div class="progress-fill"
                    style="width:${percent}%"></div>
                </div>

                <small>${percent}% Complete</small>

                <div>
                    ${task.subtasks.map((s,i)=>`
                        <div class="subtask">
                            <input type="checkbox"
                            ${s.completed?'checked':''}
                            onchange="board.toggleSubtask('${task.id}',${i})">

                            <span>${s.text}</span>
                        </div>
                    `).join("")}
                </div>

                <button class="btn"
                onclick="addSubtask('${task.id}')">
                Add Subtask
                </button>
            `;

            document.querySelector(
                `[data-status="${task.status}"] .task-list`
            ).appendChild(card);
        });

        document.getElementById("todoCount").textContent=counts.todo;
        document.getElementById("progressCount").textContent=counts.progress;
        document.getElementById("doneCount").textContent=counts.done;
    }
}

const board=new TaskBoard();

function openModal(){
    document.getElementById("modal").style.display="flex";
}

function createTask(){

    let task={
        id:Date.now().toString(),
        title:title.value,
        description:description.value,
        priority:priority.value,
        dueDate:dueDate.value,
        created:new Date().toISOString(),
        status:"todo",
        subtasks:[]
    };

    board.add(task);

    modal.style.display="none";

    title.value="";
    description.value="";
}

function addSubtask(id){

    let text=prompt("Subtask name");

    if(!text) return;

    let task=board.tasks.find(t=>t.id===id);

    task.subtasks.push({
        text,
        completed:false
    });

    board.save();
}

function toggleTheme(){
    document.body.classList.toggle("dark");
}

function exportTasks(){

    const blob=new Blob(
        [JSON.stringify(board.tasks,null,2)],
        {type:"application/json"}
    );

    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="tasks.json";
    a.click();
}

document.getElementById("importFile")
.addEventListener("change",e=>{

    let file=e.target.files[0];

    if(!file) return;

    let reader=new FileReader();

    reader.onload=function(){

        board.tasks=JSON.parse(reader.result);

        board.save();

        showToast("Tasks imported");
    };

    reader.readAsText(file);
});

function showToast(msg){

    let t=document.getElementById("toast");

    t.innerText=msg;

    t.style.display="block";

    setTimeout(()=>{
        t.style.display="none";
    },2000);
}
</script></body>
</html>
